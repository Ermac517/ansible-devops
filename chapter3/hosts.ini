# Application servers
[app]
192.168.56.4
192.168.56.5

# Database servers
[db]
192.168.56.6

# Group 'multi' with all servers
[multi:children]
app
db

# Variable that will be applied to all servers
[multi:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=~/.vagrant.d/insecure_private_keys/vagrant.key.rsa
ansible_python_interpreter=/usr/bin/python3.9
ansible_ssh_common_args='-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa'
